<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="/vendor/jquery.js" charset="utf-8"></script>
    <script src="client.js" charset="utf-8"></script>
    <link rel="stylesheet" href="style.css">
    <title>weekend-sql-to-do-list</title>
</head>
<body>
    <header>
        <h1>Weekend To Do List</h1>
    </header>
    <div>
        <input type="text" placeholder="Task Name" id="taskName"/>
        <input type="text" placeholder="Is task completed" id="taskCompleted"/>
        <input type="text" placeholder="Task Notes" id="taskNotes"/>
        <button id="addTaskBtn" type="button">Add Task</button>
        <button id="deleteTaskBtn" type="button">Delete Task</button>
    </div>
    <div>
        <h2>Task List</h2>
    </div>
    <table>
        <thead>
          <tr>
              <th>Task Name</th>
              <th>Is Task Complete</th>
              <th>Task Notes</th>
          </tr>
        </thead>
        <tbody id="taskTable">
          <tr>
          </tr>
      </table>
</body>
</html>
